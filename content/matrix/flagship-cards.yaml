# Stasis — эталонные карточки (флагманский набор для проверки «на зуб»)
# v2 от 2026-07-22. Автор: агент-психолог. Проверено агентом-редактором, правки внесены (3 FIX + системные: конвейерность, хвосты, дубли).
# Статус: готово к тесту на 5–10 предпринимателях.
# {score} — плейсхолдер, подставляется реальный балл сферы из колеса (карточка подаётся для самой слабой сферы).

sphereInsights:
  health:
    area: health
    observation: "Здоровье ты оценил на {score} из 10 — одна из самых низких оценок в твоём колесе. У деятельных людей эта сфера часто проседает первой: она не присылает дедлайнов и не жалуется, пока не заявит о себе резко. Проверь, откликается ли."
    recommendation:
      trigger: "Сегодня вечером, когда закроешь ноутбук"
      action: "Поставь в календарь на завтра один 20-минутный слот под что-то телесное — пешая прогулка, лечь спать на 30 минут раньше или запись к врачу, которую откладываешь"
      minThreshold: "Достаточно одного слота под одну задачу — не расписания на неделю"
      doneCriterion: "В календаре стоит конкретное событие со временем, а не пометка «заняться здоровьем»"
    reflectiveQuestion: "Если бы твоё тело могло оставить тебе одно голосовое сообщение, что бы оно сказало прямо сейчас?"

  family:
    area: family
    observation: "Семью ты отметил на {score} из 10 — ниже, чем сферы, куда уходит рабочая энергия. Часто у занятых людей близкие получают уже «остаток» внимания в конце дня, и это копится тихо. Посмотри, так ли это у тебя."
    recommendation:
      trigger: "Ближайший вечер, когда ты дома и не на созвоне"
      action: "Проведи 15 минут с близким человеком без телефона — убери его в другую комнату и просто поговори или побудь рядом"
      minThreshold: "15 минут и один человек — не семейный выход и не выходной целиком"
      doneCriterion: "Прошло 15 минут живого контакта, за которые ты ни разу не взял телефон в руки"
    reflectiveQuestion: "Кому из близких в последнее время доставался в основном занятой, спешащий ты?"

  rest:
    area: rest
    observation: "Отдых получил у тебя {score} из 10. У деятельных людей отдых часто незаметно подменяется той же работой под другим соусом — «полезное» чтение, нетворкинг, планирование «на подумать». Проверь по факту: после твоего отдыха ты чувствуешь себя заряженным — или просто чуть менее уставшим?"
    recommendation:
      trigger: "В ближайшие выходные, в первой половине дня"
      action: "Дай себе 30 минут настоящего восстановления без входящих сигналов — прогулка без телефона и наушников, дневной сон или просто побыть в тишине"
      minThreshold: "30 минут без экранов и без задач — не «правильный» распорядок отдыха"
      doneCriterion: "Прошло 30 минут, в которые ты ничего не потреблял и ничего не решал"
    reflectiveQuestion: "Когда ты в последний раз отдыхал так, что не проверял, «окупается» ли это время?"

  friends:
    area: friends
    observation: "Друзей ты оценил на {score} из 10. Дружба почти не подаёт сигналов тревоги — не ставит сроков и не напоминает о себе, поэтому у занятых людей годами держится «на потом». Проверь на себе: за последний месяц сколько раз ты написал другу первым — без делового повода?"
    recommendation:
      trigger: "Сегодня, в любой момент, когда есть 2 свободные минуты"
      action: "Напиши одному человеку, с которым давно не общался, короткое сообщение без повода — просто «вспомнил тебя, как ты?»"
      minThreshold: "Одно сообщение одному человеку — не план встреч и не звонок на час"
      doneCriterion: "Сообщение ушло, и в нём нет ни одного делового вопроса"
    reflectiveQuestion: "С кем тебе было бы легко и хорошо, если бы вы всё-таки увиделись, — и что тебя останавливает написать первым?"

  career:
    area: career
    observation: "Карьеру и бизнес ты оценил на {score} из 10 — а это сфера, куда обычно уходит больше всего сил. Когда даже она получает низкий балл, это чаще сигнал не про объём работы, а про то, что усилия и отдача разошлись. Стоит присмотреться, если это про тебя."
    recommendation:
      trigger: "Завтра утром, до того как откроешь почту и мессенджеры"
      action: "Выпиши на бумагу одну задачу, которая сильнее всего влияет на результат, и сделай по ней первый шаг раньше, чем займёшься входящими"
      minThreshold: "Одна задача и один первый шаг — не разбор всех дел и не новая система приоритетов"
      doneCriterion: "По выбранной задаче сделано конкретное действие раньше, чем ты открыл входящие"
    reflectiveQuestion: "Какая часть твоей работы даёт тебе энергию, а какая только забирает — и когда сместился баланс между ними?"

  hobby:
    area: hobby
    observation: "Увлечения «для себя» у людей, вложенных в дело, первыми уходят под нож ради продуктивности — а вместе с ними уходит источник энергии, не связанный с результатами. Хобби ты отметил на {score} из 10. Узнаёшь?"
    recommendation:
      trigger: "На этой неделе, в вечер, который обычно «сгорает» на дела"
      action: "Верни в календарь один час на занятие, которое когда-то тебя увлекало, но давно заброшено"
      minThreshold: "Один час на одно увлечение — не поиск нового хобби и не регулярный график"
      doneCriterion: "Час проведён за этим занятием, даже если получилось хуже, чем раньше"
    reflectiveQuestion: "Чем ты занимался с азартом до того, как всё время стало уходить на дела?"

matrix:
  fire:
    career:
      element: fire
      area: career
      strengthFraming: "Огонь как ведущая стихия — это способность видеть картину целиком и зажигаться будущим там, где другие видят только таблицы. Ты умеешь вести за собой идеей. Обратная сторона той же силы: то, что даёт энергию видению, забирает интерес к цифрам и рутине, без которых это видение не выживает. Это не отдельный дефект, а цена твоей главной сильной черты."
      belief: "«Деньги и цифры — скучная рутина, а мне важна идея.» Знакомо?"
      pattern: "Внимание уходит на замысел и большие ставки, а юнит-экономика и регулярные цифры остаются без хозяина → решения принимаются на ощущение, и в какой-то момент красивый план встречается с пустой кассой. У людей с таким профилем это встречается часто — проверь, про тебя ли это."
      recommendation:
        trigger: "Каждую пятницу, в конце рабочей недели"
        action: "Открой три цифры своего бизнеса — деньги на счету, выручку недели и главный расход — и просто посмотри на них 10 минут"
        minThreshold: "Три цифры раз в неделю — не финмодель и не погружение в бухгалтерию"
        doneCriterion: "В пятницу ты знаешь эти три числа и то, как они изменились с прошлой недели"
        delegateVariant: "Если цифры тебя гасят — назначь ответственного, который к пятнице присылает тебе эти три числа одним сообщением, а твоя задача только прочитать их"
      openQuestion: "Что должно быть правдой в цифрах, чтобы твоя идея прожила достаточно долго и успела раскрыться?"

  water:
    career:
      element: water
      area: career
      strengthFraming: "Вода как ведущая стихия — это чувствительность к людям и умение строить отношения, на которых держится команда. Рядом с тобой людям хочется работать. Обратная сторона той же силы: чуткость к чужому состоянию делает конфликт и жёсткое требование почти физически неприятными — и ты избегаешь их даже там, где они нужны делу. Это не слабость характера, а изнанка той же эмпатии."
      belief: "«Если я потребую жёстко — команда меня возненавидит.» Знакомо?"
      pattern: "Ради сохранения тепла неудобные разговоры откладываются, а планка не проговаривается прямо → сильные сотрудники, которым нужна ясность, устают от размытости и уходят первыми, а те, кто пользуется мягкостью, остаются. Так у тебя?"
      recommendation:
        trigger: "На ближайшей встрече один на один с сотрудником"
        action: "Проговори вслух одно конкретное ожидание в формате «мне нужно, чтобы к [срок] было [результат]» — одно, самое важное"
        minThreshold: "Одно ожидание одному человеку — не разбор всех недоработок и не смена стиля руководства"
        doneCriterion: "Ожидание произнесено вслух с конкретным сроком и результатом, и сотрудник его услышал"
        delegateVariant: "Если сказать самому пока тяжело — назначь на роль «держателя планки» руководителя направления, который формулирует требования по срокам, а ты остаёшься тем, к кому идут за поддержкой"
      openQuestion: "Чем на самом деле оборачивается для человека твоя мягкость — заботой о нём или лишением ясности, которая ему нужна?"

  air:
    family:
      element: air
      area: family
      strengthFraming: "Воздух как ведущая стихия — это ясная голова, способность видеть логику и принимать решения, не тонущие в эмоциях. На тебя можно опереться, когда остальным страшно. Обратная сторона той же силы: то, что помогает сохранять объективность в делах, дома оборачивается дистанцией — близким иногда нужен не разумный анализ, а просто твоё тепло и присутствие. Это не холодность как черта, а тот же инструмент, применённый не там."
      belief: "«Если проблему нельзя решить логически, то и обсуждать её нет смысла.» Знакомо?"
      pattern: "Разговор с близкими незаметно превращается в поиск решения или разбор, где чувства кажутся неэффективными → близкий, которому хотелось быть услышанным, чувствует себя «задачей» и постепенно перестаёт делиться. Если узнаёшь — стоит присмотреться."
      recommendation:
        trigger: "В следующий раз, когда близкий рассказывает тебе о чём-то трудном"
        action: "Прежде чем предложить решение, задай один вопрос про чувства — «а тебе сейчас каково от этого?» — и выслушай ответ, не переходя к советам"
        minThreshold: "Один вопрос и одна пауза — не смена роли и не долгий душевный разговор по расписанию"
        doneCriterion: "Ты задал вопрос про чувства и выдержал ответ, не предложив в этот момент решения"
        delegateVariant: "Если самому трудно поймать этот момент — договорись с близким, что он прямо говорит «мне сейчас нужно, чтобы ты просто выслушал, а не решал», и это станет вашим общим сигналом"
      openQuestion: "Что твои близкие получают от тебя, когда ты просто рядом, — чего не могут получить от твоих решений?"

    friends:
      element: air
      area: friends
      strengthFraming: "Воздух как ведущая стихия — это самостоятельность мышления и умение быть опорой самому себе, не завися от чужого одобрения. Тебе хорошо наедине с задачей. Обратная сторона той же силы: та же автономность делает поддержание дружеских связей чем-то необязательным — ты справляешься сам, и рука не тянется написать первым. Это не замкнутость как черта, а изнанка твоей самодостаточности."
      belief: "«Настоящие друзья и так поймут, а специально поддерживать связь — как-то искусственно.» Узнаёшь за собой?"
      pattern: "Раз общение не ощущается необходимостью, инициатива каждый раз откладывается «до повода» → поводов не появляется, связи истончаются сами собой, и в трудный момент оказывается, что позвонить особо некому. Похоже на твою историю?"
      recommendation:
        trigger: "Сегодня или завтра, в любой перерыв между делами"
        action: "Напиши одному человеку конкретное приглашение с датой — «давай созвонимся в четверг вечером» — а не расплывчатое «надо бы увидеться»"
        minThreshold: "Одно приглашение одному человеку с конкретной датой — не восстановление всего круга общения"
        doneCriterion: "Отправлено сообщение, в котором есть имя человека и конкретный день"
        delegateVariant: "Если инициировать самому непривычно — назначь себе повторяющееся напоминание раз в две недели «написать одному человеку», чтобы решение не зависело от настроения"
      openQuestion: "Кому бы ты позвонил, если бы прямо сейчас случилось что-то важное и радостное, — и знает ли этот человек, что он в этом списке?"

  earth:
    health:
      element: earth
      area: health
      strengthFraming: "Земля как ведущая стихия — это надёжность, внимание к деталям и умение довести дело до осязаемого результата. Ты держишь то, что другие роняют. Обратная сторона той же силы: погружённость в конкретные задачи и операционку заполняет всё время без остатка, и тело становится ещё одной «деталью», до которой руки дойдут потом. Это не безответственность к себе, а та же добросовестность, направленная вовне, а не внутрь."
      belief: "«Займусь здоровьем, когда закрою все дела, — сейчас не до того.» Знакомо?"
      pattern: "Срочные практичные задачи почти всегда кажутся важнее не-срочного здоровья, и очередь до него так и не доходит → мелкие сигналы тела копятся, пока не превращаются в проблему, которую уже нельзя отложить. Знакомая динамика?"
      recommendation:
        trigger: "Каждый рабочий день, в момент, который уже привязан к рутине, — например, первый кофе"
        action: "Прицепи к этому моменту одно простое телесное действие — стакан воды, 10 приседаний или 5 минут разминки"
        minThreshold: "Одно действие в день, привязанное к уже существующей привычке — не спортивный режим и не диета"
        doneCriterion: "Три дня подряд действие выполнено вместе со своим «якорем»"
        delegateVariant: "Если сам забываешь — назначь ответственным приложение-напоминание или договорись с коллегой делать это в одно и то же время, чтобы держать друг друга"
      openQuestion: "Какую деталь своего состояния ты замечал бы сразу, если бы относился к телу так же внимательно, как к работе?"

    hobby:
      element: earth
      area: hobby
      strengthFraming: "Земля как ведущая стихия — это умение делать вещи руками, доводить начатое до конца и получать честное удовольствие от осязаемого результата. То, что ты создаёшь, можно потрогать, и на это можно положиться. Обратная сторона той же силы: та же практичность спрашивает у любого занятия «а какая от этого польза?» — и хобби без измеримого выхода начинает казаться тратой времени, которую ты себе не разрешаешь. Это не сухость характера, а изнанка твоей ориентации на результат."
      belief: "«Тратить время на то, что не приносит пользы, — расточительство.» Знакомо?"
      pattern: "Любое увлечение проходит проверку на полезность, и то, что делается просто ради удовольствия, отсеивается первым → остаются одни продуктивные активности, а источник энергии, не связанный с результатом, пересыхает. Проверь, так ли у тебя."
      recommendation:
        trigger: "В ближайшие выходные, в конкретный час, который ты заранее отметишь в календаре"
        action: "Займись руками чем-то бесполезным, но приятным — собери, смастери или приготовь что-то ради процесса, а не ради результата"
        minThreshold: "Один час одного занятия — не поиск призвания и не регулярное расписание"
        doneCriterion: "Час проведён за занятием, от которого не осталось никакого «полезного» результата, кроме твоего состояния"
        delegateVariant: "Если сам не выделишь время — попроси близкого забронировать этот час вместе с тобой и относиться к нему так же серьёзно, как к рабочей встрече"
      openQuestion: "Что ты делал раньше просто потому, что нравится, — и в какой момент решил, что это «непозволительная роскошь»?"
