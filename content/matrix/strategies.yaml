# Stasis — ось «Стратегии поведения» (приобретённое, по Адлеру/Драйкурсу)
# v1 от 2026-07-23. Автор: агент-психолог. Статус: на валидации проверяющим.
# Ортогональна оси «Стихии»: стихия = когнитивный стиль в нейтральной ситуации;
# стратегия = межличностный защитный манёвр ПОД СТРЕССОМ. Пример независимости:
# «Земля+уклонение» и «Воздух+уклонение» — одна стратегия на разных стихиях.

strategies:
  power:
    name: Власть
    coreDrive: >-
      Значимость через контроль над ситуацией и людьми: «я на месте, когда
      последнее слово и рычаги — у меня».
    childhoodLogic: >-
      Нередко за этим стоит ранний опыт среды, где безопасность приходилось
      добывать самому — там, где уступивший терял, а решал тот, кто дожал.
      Ребёнок часто делает вывод: контроль надёжнее доверия.
    underStress: >-
      Под давлением во взаимодействии человек перехватывает разговор, задаёт
      условия, продавливает свою линию, усиливает нажим (тон, темп, повтор
      аргумента), с трудом отпускает право решать другому. Уступка в моменте
      ощущается как проигрыш, поэтому он держит поле до тех пор, пока другой
      не сдвинется.
    gift: >-
      Берёт ответственность там, где другие замирают: в кризисе рядом с ним
      понятно, кто принимает решение и куда идём. Двигает дела через
      сопротивление.
    cost: >-
      Люди вокруг перестают приносить неудобную правду и инициативу — проще
      согласиться, чем спорить. В отношениях копится дистанция, в команде —
      выученная пассивность и тихий саботаж.
    growthNudge: >-
      В следующем напряжённом разговоре попробуй один раз сознательно отдать
      решение другому в некритичном вопросе и понаблюдай, что происходит.
      Проверь, откликается ли: контроль над исходом и контроль над разговором —
      разные вещи.
  attention:
    name: Внимание
    coreDrive: >-
      Значимость через то, что тебя видят и признают: «я на месте, когда я
      замечен и обо мне помнят».
    childhoodLogic: >-
      Часто за этим стоит среда, где тепло и признание доставались за
      заметность — за яркость, достижение, эмоцию, — а в «фоне» ребёнок
      переставал существовать для взрослых. Отсюда вывод: быть незамеченным
      опаснее, чем быть неудобным.
    underStress: >-
      Под давлением человек усиливает присутствие: говорит громче и больше,
      возвращает фокус на себя, ярче предъявляет своё состояние («мне сейчас
      тяжело — увидьте это»), ищет реакции и подтверждения. Молчание и
      невнимание в конфликте переживаются острее самого конфликта.
    gift: >-
      Оживляет и связывает людей, не даёт группе замереть, открыто называет
      то, что другие прячут. Рядом с ним контакт живой, а атмосфера —
      человеческая.
    cost: >-
      Разговор незаметно смещается на его состояние, и чужая повестка тонет.
      Партнёры и команда устают «подпитывать», а сам он попадает в зависимость
      от чужой реакции и теряет опору внутри.
    growthNudge: >-
      В одном сложном разговоре попробуй удержать фокус на собеседнике на минуту
      дольше, чем хочется, ничего не добавляя о себе. Проверь, откликается ли:
      тебя замечают не меньше, когда ты сам искренне замечаешь другого.
  superiority:
    name: Превосходство
    coreDrive: >-
      Значимость через то, что ты прав и лучше: «я на месте, когда я
      компетентнее и точнее остальных».
    childhoodLogic: >-
      Нередко за этим стоит среда, где любили и ценили «за результат и за
      правоту», а ошибка стоила принятия. Ребёнок часто выучивает: быть правым
      безопаснее, чем быть живым и уязвимым.
    underStress: >-
      Под давлением человек доказывает свою правоту и поправляет других, при
      критике быстро находит, в чём слаб оппонент, занимает позицию «сверху» —
      экспертную или моральную, — и ему трудно вслух признать, что чего-то не
      знает или ошибся. Признание неправоты ощущается как потеря опоры.
    gift: >-
      Держит планку и не даёт группе скатиться в халтуру: там, где остальные
      готовы на «и так сойдёт», он не соглашается на меньшее и подтягивает
      общий стандарт вверх.
    cost: >-
      Рядом становится небезопасно ошибаться и думать вслух, люди закрываются
      и перестают спорить. Он остаётся прав, но всё более одинок; обратная
      связь до него не доходит.
    growthNudge: >-
      В ближайшем споре попробуй один раз сказать вслух «здесь я могу
      ошибаться» или «я этого не знаю» — без последующего «но». Проверь,
      откликается ли: признанная уязвимость чаще поднимает авторитет, чем
      роняет его.
  avoidance:
    name: Уклонение
    coreDrive: >-
      Значимость через сохранность: «я на месте, когда меня не трогают и мне
      не грозит провал или отвержение».
    childhoodLogic: >-
      Часто за этим стоит опыт, где открытое столкновение или ошибка приводили
      к боли или потере принятия, а «стать тихим и незаметным» реально спасало.
      Отсюда вывод: не высовываться — безопаснее, чем рисковать.
    underStress: >-
      Под давлением человек сворачивает контакт: замолкает, уходит из
      разговора, тянет с ответом, внешне соглашается, чтобы всё поскорее
      закончилось, а потом не делает. Прямое выяснение отношений он обходит,
      становясь незаметным, пока накал не спадёт.
    gift: >-
      Не подливает масла в огонь: в накалённой ситуации гасит эскалацию,
      не рубит сгоряча, даёт эмоциям остыть и часто спасает отношения от
      непоправимых слов.
    cost: >-
      Нерешённое копится молча, партнёры не понимают, чего он на самом деле
      хочет, и достраивают сами. Его позиция остаётся невысказанной, а решения
      — принятыми без него.
    growthNudge: >-
      В одном разговоре, из которого тянет уйти, попробуй остаться и назвать
      вслух одну свою потребность прямо — коротко, без оправданий. Проверь,
      откликается ли: названное несогласие чаще сближает, чем разрушает.

strategyTest:
  scale:
    type: agreement
    min: 1
    max: 6
    minLabel: совсем не про меня
    maxLabel: точно про меня
  items:
    - id: 1
      loads: power
      key: direct
      situation: В споре всё идёт не по-твоему.
      statement: Я продолжаю настаивать на своём, пока собеседник не уступит.
    - id: 2
      loads: power
      key: direct
      situation: В важном для тебя вопросе кто-то начинает решать за тебя.
      statement: Я перехватываю разговор и сам задаю условия, на которых мы продолжим.
    - id: 3
      loads: power
      key: direct
      situation: В напряжённом разговоре ты чувствуешь, что теряешь контроль над ходом.
      statement: Я усиливаю нажим — тоном, темпом, повтором аргумента, — чтобы вернуть разговор под себя.
    - id: 4
      loads: power
      key: reverse
      situation: В конфликте другой человек берёт руководство на себя.
      statement: Мне легко отдать право решать ему, без внутреннего сопротивления.
    - id: 5
      loads: attention
      key: direct
      situation: В разговоре тебя перестают замечать.
      statement: Я делаю или говорю что-то, чтобы снова оказаться в фокусе.
    - id: 6
      loads: attention
      key: direct
      situation: Тебя задели при других людях.
      statement: Мне важно, чтобы окружающие увидели и признали, как мне сейчас непросто.
    - id: 7
      loads: attention
      key: direct
      situation: Идёт напряжённая встреча, обстановка накалена.
      statement: Я скорее вставлю реплику и обозначу себя вслух, чем промолчу и останусь в тени.
    - id: 8
      loads: attention
      key: reverse
      situation: В группе под давлением момента про тебя как будто забыли.
      statement: Мне легко остаться в стороне — быть в тени для меня комфортно.
    - id: 9
      loads: superiority
      key: direct
      situation: Собеседник при других уверенно говорит то, что ты считаешь ошибкой.
      statement: Мне трудно смолчать — важно, чтобы стало видно, что прав я.
    - id: 10
      loads: superiority
      key: direct
      situation: Тебя критикуют в разговоре.
      statement: Я быстро нахожу, в чём сам оппонент слабее или неправ.
    - id: 11
      loads: superiority
      key: direct
      situation: Под давлением всплывает вопрос, в котором ты не силён.
      statement: Я скорее покажу, что разбираюсь лучше, чем признаю, что чего-то не знаю.
    - id: 12
      loads: superiority
      key: reverse
      situation: В напряжённом разговоре выясняется, что неправ был ты.
      statement: Мне легко открыто признать это при других.
    - id: 13
      loads: avoidance
      key: direct
      situation: Между вами назревает конфликт.
      statement: Я скорее сверну разговор или выйду, чем стану выяснять отношения.
    - id: 14
      loads: avoidance
      key: direct
      situation: На тебя давят, требуя решения прямо сейчас.
      statement: Я тяну, откладываю ответ или молча соглашаюсь, лишь бы разговор поскорее закончился.
    - id: 15
      loads: avoidance
      key: direct
      situation: Ситуация резко обостряется.
      statement: Я замолкаю и стараюсь стать незаметным, пока накал не спадёт.
    - id: 16
      loads: avoidance
      key: reverse
      situation: Отношения накаляются, и напряжение растёт.
      statement: Я иду навстречу и проговариваю проблему прямо, даже если это неприятно.

interactionGuides:
  - you: power
    other: power
    collision: >-
      Двое держат поле и не отпускают решение — разговор превращается в
      перетягивание, где каждый дожимает, а уступка читается как проигрыш.
      Тема тонет, остаётся борьба за то, «чьё будет сверху».
    howTo:
      - Разведи власть по зонам: заранее договоритесь, кто в каком вопросе принимает финальное решение, — тогда не придётся отвоёвывать его в каждом разговоре.
      - Смени рамку «кто победит» на «какая у нас общая цель»: назови вслух, чего вы оба хотите добиться, — это выводит из режима поединка.
      - Уступи первым в мелочи вслух («здесь делаем по-твоему») — с равным это читается не как слабость, а как сила и разряжает гонку.
  - you: power
    other: attention
    collision: >-
      Ты давишь на суть и темп, ему нужно быть увиденным и признанным. Чем
      сильнее ты дожимаешь, тем громче он тянет фокус на себя и своё состояние —
      и вы оба не про дело.
    howTo:
      - Дай признание первым и явно: короткое «я вижу, для тебя это важно» снимает у него голод по вниманию быстрее, чем любой аргумент.
      - Разведи во времени: сначала выслушай без перебивания, потом переходи к решению — если оборвать, он будет добирать внимание весь разговор.
      - Формулируй задачу как его роль на виду («ты это ведёшь, с тебя результат»), а не как приказ сверху.
  - you: power
    other: superiority
    collision: >-
      Ты давишь на решение, он — на правоту. Ты хочешь, чтобы сделали по-твоему,
      он хочет, чтобы признали, что прав он. Спор уходит в «кто кого передавит
      против кто точнее», и никто не двигается.
    howTo:
      - Отдели решение от правоты: признай его экспертную точку («по фактам ты прав»), но оставь за собой выбор действия — ему важнее первое, тебе второе.
      - Спрашивай, а не декларируй: «как бы ты это сделал?» вовлекает его компетентность на твою сторону вместо лобового столкновения.
      - Не бей по его знанию в лоб — при ударе по компетентности он окопается; оспаривай вывод, а не его как эксперта.
  - you: power
    other: avoidance
    collision: >-
      Ты усиливаешь нажим, он в ответ замолкает, тянет и внешне соглашается,
      чтобы разговор закончился. Ты принимаешь тишину за согласие, а решение
      потом не выполняется — давление загоняет его в уход.
    howTo:
      - Сбавь темп и нажим намеренно: дай паузу и время на ответ — под прессом он говорит «да» лишь бы отпустили, а не потому что согласен.
      - Спрашивай о несогласии прямо и безопасно: «что здесь для тебя не работает?» — и держи паузу, не заполняя её за него.
      - Фиксируй маленькие конкретные договорённости с датой вместо общего «ок» — так молчаливое уклонение не превратится в невыполнение.
  - you: attention
    other: power
    collision: >-
      Тебе нужно быть увиденным, ему — контроль над разговором. Он рубит по
      сути и не даёт тебе места, ты добираешь внимание ярче и эмоциональнее —
      он читает это как помеху и давит сильнее.
    howTo:
      - Заходи через его цель: сначала покажи, что двигаешь его результат, — внимание к тебе он даст в обмен на пользу, а не на яркость.
      - Проси конкретный отклик прямо («скажи, это то, что нужно?») вместо того чтобы добиваться реакции эмоцией — с ним прямой запрос работает быстрее.
      - Держи один-два сильных тезиса, а не поток: под его нетерпимость к воде краткость даёт тебе больше признания, чем объём.
  - you: attention
    other: attention
    collision: >-
      Двоим одновременно нужно быть в центре — разговор превращается в
      соревнование за фокус, где каждый ждёт отклика и перебивает, а слушать
      некому. Оба уходят недокормленными вниманием.
    howTo:
      - Договоритесь о ритме явно: «сначала ты полностью, потом я» — очередь снимает борьбу за место в фокусе.
      - Стань зеркалом первым: искренне отрази его («вот что я в тебе услышал»), и он охотнее отдаст фокус тебе — внимание возвращается по кругу.
      - Следи, чтобы предмет разговора не утонул: раз в несколько минут возвращайте вслух, ради чего вы вообще встретились.
  - you: attention
    other: superiority
    collision: >-
      Ты идёшь через эмоцию и контакт, он — через правоту и позицию сверху.
      Твою живость он может встретить снисходительной поправкой, и ты
      чувствуешь себя обесцененным, ещё ярче добирая признание.
    howTo:
      - Не конкурируй за экспертность — признай его сильную сторону, и он перестанет обороняться и мягче тебя услышит.
      - Переводи чувства в конкретный запрос («мне важно, чтобы это заметили» → «дай, пожалуйста, отклик по этому пункту») — на предметное он отвечает охотнее, чем на эмоцию.
      - Не принимай поправку на свой счёт как отвержение: для него это способ держать планку, а не удар по тебе лично.
  - you: attention
    other: avoidance
    collision: >-
      Тебе нужен живой отклик, он под напряжением закрывается и уходит в
      тишину. Чем активнее ты добиваешься реакции, тем сильнее он отступает —
      и ты остаёшься без подтверждения, которого ищешь.
    howTo:
      - Сбавь интенсивность и дай воздух: тихий, безопасный тон вытягивает его из раковины лучше, чем яркий напор, который его пугает.
      - Задавай короткие конкретные вопросы вместо эмоционального ожидания отклика — ему проще ответить на «да/нет» или «что выбираешь», чем соответствовать твоему накалу.
      - Не заполняй паузы за него: оставь тишину на пару секунд дольше, чем комфортно, — именно в ней он решается заговорить.
  - you: superiority
    other: power
    collision: >-
      Ты держишься за правоту, он — за контроль. Ты доказываешь, что точнее,
      он продавливает, что будет по его. Ты видишь его напор как игнор фактов,
      он твою правоту — как саботаж его решения.
    howTo:
      - Отдели «прав» от «главный»: признай его право на финальное решение вслух, тогда он услышит твою экспертизу вместо того, чтобы давить её.
      - Подавай знание как поддержку его цели («чтобы твой план сработал, учти вот это»), а не как урок сверху.
      - Не поправляй его при людях — по статусу это для него удар, и он упрётся; придержи корректировку до разговора один на один.
  - you: superiority
    other: attention
    collision: >-
      Ты ценишь точность и позицию эксперта, ему нужно быть увиденным. Твоя
      поправка бьёт по его потребности в признании, он реагирует эмоцией и
      яркостью, а ты читаешь это как несерьёзность.
    howTo:
      - Признай прежде, чем поправить: «в этом ты сильно продвинул, и вот что ещё усилит» — сначала видимость, потом коррекция.
      - Держи критику про предмет, а не про него: «этот пункт стоит уточнить» вместо оценки, которую он примет на свой счёт.
      - Дай ему сцену там, где не критично: публичное признание его вклада покупает тебе право быть требовательным по сути.
  - you: superiority
    other: superiority
    collision: >-
      Двое борются за то, кто правее и компетентнее — спор уходит в
      интеллектуальный поединок, где признать чужую точку значит проиграть.
      Оба окапываются, и вместо решения растёт список аргументов.
    howTo:
      - Первым признай сильное в его позиции — с равным это не капитуляция, а то, что размыкает клинч и открывает его к твоим доводам.
      - Договоритесь о критерии, а не о правоте: «по какому признаку поймём, чей вариант сработал?» — переводит спор из эго в проверяемое.
