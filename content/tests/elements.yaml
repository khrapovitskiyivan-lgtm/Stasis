# PROVISIONAL — spike-gated by pilot (see docs/spec-first/track-map.md); items may be culled/rewritten after EFA.
# Stasis — тест «Стихии» (когнитивный стиль, ось 1: врождённое).
# Земля=Ощущение(S), Воздух=Мышление(T), Вода=Чувство(F), Огонь=Интуиция(N).
# Операционализация: восприятие информации и принятие решений в НЕЙТРАЛЬНЫХ,
# повседневных ситуациях — без стресса и межличностной реакции (это ортогонально
# оси «Стратегии», которая измеряет реакцию под давлением во взаимодействии,
# см. content/matrix/strategies.yaml). Каждый пункт должен быть отвечаем из
# стиля мышления/работы человека, без всякого конфликта.
# Реверс (key: reverse) — через содержательную противоположность полюса
# (S<->N, T<->F), не через отрицание «не».
version: 0.1.0-provisional
items:
  # Земля (Ощущение, S): факты, детали, конкретика, проверенное на практике.
  - { id: e-earth-1, loads: earth, key: direct, statement: "Прежде чем принять решение, я хочу опереться на конкретные факты и детали." }
  - { id: e-earth-2, loads: earth, key: direct, statement: "Я больше доверяю тому, что можно потрогать и проверить на практике, чем красивой идее без подтверждения." }
  - { id: e-earth-3, loads: earth, key: direct, statement: "Разбираясь в новой теме, я в первую очередь ищу конкретные примеры и цифры, а не общую теорию." }
  - { id: e-earth-4, loads: earth, key: direct, statement: "Я предпочитаю проверенный, отработанный способ действия — новому и ещё не испытанному." }
  - { id: e-earth-5, loads: earth, key: reverse, statement: "Обдумывая задачу, я быстрее перехожу к тому, что из неё может получиться в будущем, чем разбираюсь в деталях происходящего сейчас." }
  - { id: e-earth-6, loads: earth, key: reverse, statement: "При планировании меня больше увлекает общая идея и её потенциал, чем пошаговые детали её воплощения." }

  # Воздух (Мышление, T): логика, системы, объективные критерии.
  - { id: e-air-1, loads: air, key: direct, statement: "Принимая решение, я в первую очередь опираюсь на логику и объективные критерии." }
  - { id: e-air-2, loads: air, key: direct, statement: "При выборе между вариантами я сначала анализирую объективные плюсы и минусы, а уже потом думаю, как это будет воспринято." }
  - { id: e-air-3, loads: air, key: direct, statement: "Разбирая сложную задачу, я раскладываю её на составные части и ищу закономерности между ними." }
  - { id: e-air-4, loads: air, key: direct, statement: "Для меня важно, чтобы план или система были логически последовательны и внутренне непротиворечивы." }
  - { id: e-air-5, loads: air, key: reverse, statement: "Оценивая ситуацию, я в первую очередь чувствую, насколько она согласуется с тем, что важно для людей, а не насколько она логична." }
  - { id: e-air-6, loads: air, key: reverse, statement: "При выборе решения для меня важнее, чтобы всем было комфортно, чем чтобы оно было формально самым правильным." }

  # Вода (Чувство, F): ценности, люди, гармония, что ощущается правильным.
  - { id: e-water-1, loads: water, key: direct, statement: "Принимая решение, я в первую очередь думаю о том, как оно скажется на людях." }
  - { id: e-water-2, loads: water, key: direct, statement: "Для меня важно, чтобы решение ощущалось правильным по ценностям, даже если логически можно обосновать другой вариант." }
  - { id: e-water-3, loads: water, key: direct, statement: "Разбираясь в ситуации, я прежде всего замечаю настроение и потребности вовлечённых людей." }
  - { id: e-water-4, loads: water, key: direct, statement: "При выборе между вариантами я ориентируюсь на то, что важно и комфортно для всех сторон, а не только на объективные критерии." }
  - { id: e-water-5, loads: water, key: reverse, statement: "Оценивая ситуацию, я в первую очередь смотрю на объективные факты и цифры, а не на то, что чувствуют вовлечённые люди." }
  - { id: e-water-6, loads: water, key: reverse, statement: "При выборе решения для меня важнее формальная логика и непротиворечивость, чем то, кому как будет комфортно." }

  # Огонь (Интуиция, N): видение, будущее, картина целиком, паттерны, новизна.
  - { id: e-fire-1, loads: fire, key: direct, statement: "Обдумывая новую задачу, я прежде всего вижу общую картину и то, к чему всё это может привести." }
  - { id: e-fire-2, loads: fire, key: direct, statement: "Мне интереснее искать новые, ещё не опробованные пути, чем повторять то, что уже работает." }
  - { id: e-fire-3, loads: fire, key: direct, statement: "Я легко замечаю скрытые связи и закономерности там, где другие видят набор разрозненных фактов." }
  - { id: e-fire-4, loads: fire, key: direct, statement: "Меня больше увлекают идеи и перспективы на будущее, чем подробности текущего процесса." }
  - { id: e-fire-5, loads: fire, key: reverse, statement: "Мне спокойнее опираться на то, что уже проверено и подтверждено, чем пробовать что-то новое и неизвестное." }
  - { id: e-fire-6, loads: fire, key: reverse, statement: "Планируя следующий шаг, я в первую очередь сверяюсь с конкретными фактами и цифрами, а не строю догадки о будущем." }
